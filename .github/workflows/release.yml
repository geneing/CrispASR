name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build + release (e.g. v0.4.5)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libopenblas-dev

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_OPENBLAS=ON
          cmake --build build --target crispasr-cli crispasr-quantize -j $(nproc)

      - name: Package
        run: |
          mkdir -p release/crispasr-linux-x86_64
          cp build/bin/crispasr release/crispasr-linux-x86_64/
          cp build/bin/crispasr-quantize release/crispasr-linux-x86_64/
          cd release && tar czf crispasr-linux-x86_64.tar.gz crispasr-linux-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-linux-x86_64
          path: release/crispasr-linux-x86_64.tar.gz

  build-python-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ patchelf

      - name: Build shared libraries
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PLATFORM_NO_VERSIONED_SONAME=ON \
            -DCRISPASR_BUILD_TESTS=OFF \
            -DCRISPASR_BUILD_EXAMPLES=OFF
          cmake --build build -j$(nproc)

      - name: Build Python ctypes helpers library
        run: |
          gcc -shared -fPIC -o build/libcrispasr_helpers.so \
            python/crispasr/_helpers.c \
            -Iinclude \
            -Iggml/include \
            -Lbuild/src \
            -lwhisper \
            -Wl,-rpath,'$ORIGIN'

      - name: Package Python binding
        run: |
          PKG=release/crispasr-python-linux-x86_64/crispasr
          mkdir -p "$PKG"

          # Python sources
          cp python/crispasr/__init__.py "$PKG/"
          cp python/crispasr/_binding.py "$PKG/"

          # Shared libraries — placed alongside __init__.py so _find_lib()
          # finds them via Path(__file__).parent without LD_LIBRARY_PATH.
          # Copy ALL .so files from build/src: libwhisper.so plus the
          # backend shared libs that are produced when BUILD_SHARED_LIBS=ON
          # (libparakeet.so, libcanary.so, libqwen3_asr.so, libcohere.so,
          # libgranite_speech.so, libvoxtral.so, libvoxtral4b.so, etc.).
          # Backends declared STATIC in CMake are already inside libwhisper.so.
          find build/src -maxdepth 1 -name '*.so' -exec cp {} "$PKG/" \;
          ln -sf libwhisper.so              "$PKG/libcrispasr.so"
          cp build/ggml/src/libggml.so      "$PKG/" 2>/dev/null || true
          cp build/ggml/src/libggml-base.so "$PKG/" 2>/dev/null || true
          cp build/ggml/src/libggml-cpu.so  "$PKG/" 2>/dev/null || true
          cp build/libcrispasr_helpers.so   "$PKG/"

          # Patch RPATH to $ORIGIN so libs resolve siblings without LD_LIBRARY_PATH
          for f in "$PKG"/*.so; do
            patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
          done

          cd release && tar czf crispasr-python-linux-x86_64.tar.gz crispasr-python-linux-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-python-linux-x86_64
          path: release/crispasr-python-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_METAL=ON
          cmake --build build --target crispasr-cli crispasr-quantize -j $(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p release/crispasr-macos
          cp build/bin/crispasr release/crispasr-macos/
          cp build/bin/crispasr-quantize release/crispasr-macos/
          cd release && tar czf crispasr-macos.tar.gz crispasr-macos/

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-macos
          path: release/crispasr-macos.tar.gz

  # ── Shared-library bundle for macOS arm64 (Metal) ────────────────────────────
  #
  # Mirrors what llama.cpp's release artifacts do: ship a per-platform
  # tarball with libcrispasr.dylib + ggml backend libs + headers so any
  # downstream binding (Rust crispasr-sys, Dart crispasr, future Node/Go
  # wrappers, …) can `tar -xzf` instead of cmake-building from source.
  #
  # Layout inside the tarball matches what `crispasr-sys/build.rs`'s
  # `try_existing_build` looks for (`<bundle>/src/lib*` and
  # `<bundle>/ggml/src/libggml*`), so consumers point CRISPASR_SYS_LIB_DIR
  # at the extracted dir and the cmake-build fallback is bypassed.
  build-libs-macos-arm64:
    runs-on: macos-latest # arm64 since macos-13 was retired
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Build (shared libs, Metal)
        run: |
          cmake -S . -B build-libs \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DCRISPASR_BUILD_TESTS=OFF \
            -DCRISPASR_BUILD_EXAMPLES=OFF \
            -DCRISPASR_BUILD_SERVER=OFF
          cmake --build build-libs --config Release \
            -j $(sysctl -n hw.logicalcpu) --target crispasr

      - name: Package
        run: |
          set -euo pipefail
          OUT=release/libcrispasr-macos-arm64
          # Match the CrispASR build-tree layout that downstream wrappers
          # already auto-discover (build-flutter-bundle / build / etc.).
          mkdir -p "$OUT/src" "$OUT/ggml/src" "$OUT/include" "$OUT/ggml/include"
          # Core libs — preserve symlinks so SOVERSION-1 alias works.
          cp -P build-libs/src/libcrispasr*.dylib "$OUT/src/"
          [ -e build-libs/src/libwhisper.dylib ] && cp -P build-libs/src/libwhisper.dylib "$OUT/src/"
          # Backend libs — flat collection from every ggml subdir
          # (ggml-metal, ggml-blas, ggml-cpu …). Put them under
          # ggml/src/ at the bundle root so downstream tools that find
          # ggml libs via that path keep working.
          find build-libs/ggml/src -name 'libggml*.dylib' \( -type f -o -type l \) \
            -exec cp -P {} "$OUT/ggml/src/" \;
          # Headers so binding authors can extend the FFI without
          # vendoring the whole CrispASR repo.
          cp include/crispasr.h "$OUT/include/"
          cp ggml/include/*.h   "$OUT/ggml/include/" 2>/dev/null || true
          cp LICENSE "$OUT/"
          cd release && tar czf libcrispasr-macos-arm64.tar.gz libcrispasr-macos-arm64/
          ls -lh libcrispasr-macos-arm64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-macos-arm64
          path: release/libcrispasr-macos-arm64.tar.gz

  # ── Linux x86_64 shared libs + headers (CPU baseline) ────────────────────────
  # Mirror of build-libs-macos-arm64 for Linux: ship libcrispasr.so + ggml
  # backend libs + headers so downstream FFI consumers (Rust crispasr-sys,
  # Dart, Go, Java, Ruby) can `tar -xzf` and point CRISPASR_SYS_LIB_DIR
  # at the extract dir instead of cmake-building from source. CPU + OpenBLAS
  # only — GPU-aware variants (CUDA/Vulkan) are a separate matrix slot.
  build-libs-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libopenblas-dev patchelf

      - name: Build (shared libs, CPU + OpenBLAS)
        run: |
          cmake -S . -B build-libs \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_OPENBLAS=ON \
            -DCRISPASR_BUILD_TESTS=OFF \
            -DCRISPASR_BUILD_EXAMPLES=OFF \
            -DCRISPASR_BUILD_SERVER=OFF
          cmake --build build-libs --config Release -j $(nproc) --target crispasr

      - name: Package
        run: |
          set -euo pipefail
          OUT=release/libcrispasr-linux-x86_64
          mkdir -p "$OUT/src" "$OUT/ggml/src" "$OUT/include" "$OUT/ggml/include"
          # Core libs — preserve symlinks so SOVERSION-1 alias works.
          cp -P build-libs/src/libcrispasr*.so* "$OUT/src/"
          [ -e build-libs/src/libwhisper.so ] && cp -P build-libs/src/libwhisper.so* "$OUT/src/"
          # Per-backend shared libs (parakeet, canary, voxtral, qwen3_asr, …).
          find build-libs/src -maxdepth 1 -name 'lib*.so*' \( -type f -o -type l \) \
            ! -name 'libcrispasr*' ! -name 'libwhisper*' \
            -exec cp -P {} "$OUT/src/" \;
          # Backend libs — flat collection from every ggml subdir.
          find build-libs/ggml/src -name 'libggml*.so*' \( -type f -o -type l \) \
            -exec cp -P {} "$OUT/ggml/src/" \;
          # Patch RPATH to $ORIGIN so libs resolve siblings without
          # LD_LIBRARY_PATH (matches build-python-linux convention).
          for f in "$OUT"/src/*.so* "$OUT"/ggml/src/*.so*; do
            [ -L "$f" ] && continue
            patchelf --set-rpath '$ORIGIN:$ORIGIN/../../ggml/src' "$f" 2>/dev/null || true
          done
          # Headers so binding authors can extend the FFI without
          # vendoring the whole CrispASR repo.
          cp include/crispasr.h "$OUT/include/"
          cp ggml/include/*.h   "$OUT/ggml/include/" 2>/dev/null || true
          cp LICENSE "$OUT/"
          cd release && tar czf libcrispasr-linux-x86_64.tar.gz libcrispasr-linux-x86_64/
          ls -lh libcrispasr-linux-x86_64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-linux-x86_64
          path: release/libcrispasr-linux-x86_64.tar.gz

  # ── Windows x86_64 shared libs + headers (CPU baseline) ──────────────────────
  # Windows tarball includes BOTH the runtime DLLs (under bin/) and the MSVC
  # import .lib files (under src/Release/ — this matches what
  # crispasr-sys/build.rs::try_existing_build looks for on Windows). Consumers
  # extract the tarball, set CRISPASR_SYS_LIB_DIR, and link against the .lib
  # at build time while loading the .dll at runtime.
  build-libs-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Build (shared libs, CPU)
        run: |
          cmake -S . -B build-libs `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DCRISPASR_BUILD_TESTS=OFF `
            -DCRISPASR_BUILD_EXAMPLES=OFF `
            -DCRISPASR_BUILD_SERVER=OFF `
            -DGGML_NATIVE=OFF `
            -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON
          cmake --build build-libs --config Release -j $env:NUMBER_OF_PROCESSORS --target crispasr

      - name: Package
        shell: pwsh
        run: |
          $OUT = "release\libcrispasr-windows-x86_64"
          New-Item -ItemType Directory -Force "$OUT\bin","$OUT\src\Release","$OUT\ggml\src\Release","$OUT\ggml\bin","$OUT\include","$OUT\ggml\include" | Out-Null
          # Runtime DLLs (loaded at runtime, must be on PATH or alongside the EXE)
          Get-ChildItem build-libs\bin\Release\*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\bin\"
          Get-ChildItem build-libs\bin\Release\ggml*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\bin\"
          # Import libs (.lib — what the linker uses; mirrors the layout
          # crispasr-sys/build.rs probes for: <dir>/src/Release/*.lib)
          Get-ChildItem build-libs\src\Release\*.lib -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\src\Release\"
          Get-ChildItem build-libs\ggml\src\Release\*.lib -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\src\Release\"
          # Headers
          Copy-Item include\crispasr.h "$OUT\include\"
          Get-ChildItem ggml\include\*.h -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\include\"
          Copy-Item LICENSE "$OUT\"
          # Tar.gz (Windows 10+ ships tar; downstream tooling already
          # expects .tar.gz to mirror the macos-arm64 / linux artifacts).
          cd release
          tar -czf libcrispasr-windows-x86_64.tar.gz libcrispasr-windows-x86_64
          Get-Item libcrispasr-windows-x86_64.tar.gz | Format-List Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-windows-x86_64
          path: release/libcrispasr-windows-x86_64.tar.gz

  # ── Windows x86_64 shared libs + headers (Vulkan) ────────────────────────────
  # Same layout as build-libs-windows-x86_64 but with GGML_VULKAN=ON so the
  # produced ggml-vulkan.dll/.lib are bundled. Downstream consumers that
  # need GPU-accelerated FFI on Windows (Flutter desktop, Rust crispasr-sys
  # with --features=vulkan, etc.) point CRISPASR_SYS_LIB_DIR here.
  build-libs-windows-x86_64-vulkan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod -Uri "https://vulkan.lunarg.com/sdk/latest.json").windows
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkan_sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan_sdk.exe
          Start-Process -FilePath .\vulkan_sdk.exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          $sdk = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build (shared libs, Vulkan)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build-libs ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=ON ^
            -DCRISPASR_BUILD_TESTS=OFF ^
            -DCRISPASR_BUILD_EXAMPLES=OFF ^
            -DCRISPASR_BUILD_SERVER=OFF ^
            -DGGML_VULKAN=ON ^
            -DGGML_CUDA=OFF ^
            -DGGML_NATIVE=OFF ^
            -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON
          cmake --build build-libs --config Release -j %NUMBER_OF_PROCESSORS% --target crispasr

      - name: Package
        shell: pwsh
        run: |
          $OUT = "release\libcrispasr-windows-x86_64-vulkan"
          New-Item -ItemType Directory -Force "$OUT\bin","$OUT\src\Release","$OUT\ggml\src\Release","$OUT\ggml\bin","$OUT\include","$OUT\ggml\include" | Out-Null
          # Runtime DLLs — Vulkan build keeps things in build-libs\bin\
          # (Ninja flat layout) rather than build-libs\bin\Release.
          $BIN_DIRS = @("build-libs\bin\Release","build-libs\bin")
          foreach ($d in $BIN_DIRS) {
            if (Test-Path $d) {
              Get-ChildItem "$d\*.dll" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\bin\"
              Get-ChildItem "$d\ggml*.dll" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\ggml\bin\"
            }
          }
          # Import libs
          $LIB_DIRS = @("build-libs\src\Release","build-libs\src")
          foreach ($d in $LIB_DIRS) {
            if (Test-Path $d) {
              Get-ChildItem "$d\*.lib" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\src\Release\"
            }
          }
          $GGML_LIB_DIRS = @("build-libs\ggml\src\Release","build-libs\ggml\src")
          foreach ($d in $GGML_LIB_DIRS) {
            if (Test-Path $d) {
              Get-ChildItem "$d\*.lib" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\ggml\src\Release\"
            }
          }
          # Headers
          Copy-Item include\crispasr.h "$OUT\include\"
          Get-ChildItem ggml\include\*.h -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\include\"
          Copy-Item LICENSE "$OUT\"
          cd release
          tar -czf libcrispasr-windows-x86_64-vulkan.tar.gz libcrispasr-windows-x86_64-vulkan
          Get-Item libcrispasr-windows-x86_64-vulkan.tar.gz | Format-List Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-windows-x86_64-vulkan
          path: release/libcrispasr-windows-x86_64-vulkan.tar.gz

  # ── Linux x86_64 shared libs + headers (CUDA) ────────────────────────────────
  # CUDA 12.8 toolkit (sm_75…sm_120 incl. RTX 50xx Blackwell). Bundles
  # libggml-cuda.so alongside the standard libs/headers. Consumers must
  # have a matching CUDA driver + runtime installed on the host
  # (cudart / cublas) — we don't bundle those, since dev hosts that
  # link against a libcrispasr-cuda tarball typically have CUDA
  # already.
  build-libs-linux-x86_64-cuda:
    runs-on: ubuntu-latest
    env:
      CUDA_VERSION: "12.8.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ patchelf

      - name: Install CUDA Toolkit 12.8.0
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'network'
          # Jimver/cuda-toolkit's `sub-packages` prepends `cuda-` and
          # appends `-12-8`. That works for cuda-nvcc / cuda-cudart /
          # cuda-nvrtc / cuda-nvrtc-dev which all exist as that exact
          # name in NVIDIA's Ubuntu 24.04 apt repo. cuBLAS is the
          # exception: NVIDIA publishes it as `libcublas-dev-12-8`
          # (lib- prefix, not cuda-), so it has to go through
          # `non-cuda-sub-packages` instead.
          sub-packages: '["nvcc", "cudart", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcublas-dev"]'

      - name: Build (shared libs, CUDA)
        run: |
          cmake -S . -B build-libs \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="75-real;86-real;89-real;120-real;120-virtual" \
            -DCRISPASR_BUILD_TESTS=OFF \
            -DCRISPASR_BUILD_EXAMPLES=OFF \
            -DCRISPASR_BUILD_SERVER=OFF
          cmake --build build-libs --config Release -j $(nproc) --target crispasr

      - name: Package
        run: |
          set -euo pipefail
          OUT=release/libcrispasr-linux-x86_64-cuda
          mkdir -p "$OUT/src" "$OUT/ggml/src" "$OUT/include" "$OUT/ggml/include"
          cp -P build-libs/src/libcrispasr*.so* "$OUT/src/"
          [ -e build-libs/src/libwhisper.so ] && cp -P build-libs/src/libwhisper.so* "$OUT/src/"
          find build-libs/src -maxdepth 1 -name 'lib*.so*' \( -type f -o -type l \) \
            ! -name 'libcrispasr*' ! -name 'libwhisper*' \
            -exec cp -P {} "$OUT/src/" \;
          # ggml-cuda.so + ggml-base.so + ggml-cpu.so all live under ggml/src
          find build-libs/ggml/src -name 'libggml*.so*' \( -type f -o -type l \) \
            -exec cp -P {} "$OUT/ggml/src/" \;
          for f in "$OUT"/src/*.so* "$OUT"/ggml/src/*.so*; do
            [ -L "$f" ] && continue
            patchelf --set-rpath '$ORIGIN:$ORIGIN/../../ggml/src' "$f" 2>/dev/null || true
          done
          cp include/crispasr.h "$OUT/include/"
          cp ggml/include/*.h   "$OUT/ggml/include/" 2>/dev/null || true
          cp LICENSE "$OUT/"
          cd release && tar czf libcrispasr-linux-x86_64-cuda.tar.gz libcrispasr-linux-x86_64-cuda/
          ls -lh libcrispasr-linux-x86_64-cuda.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-linux-x86_64-cuda
          path: release/libcrispasr-linux-x86_64-cuda.tar.gz

  # ── Windows x86_64 shared libs + headers (CUDA) ──────────────────────────────
  # CUDA 12.8 toolkit (Blackwell-aware). Unlike the Linux CUDA tarball,
  # we bundle the CUDA runtime DLLs (cudart / cublas / cublasLt) so the
  # tarball is self-contained for downstream Windows consumers — matches
  # the existing build-windows-cuda EXE bundle's pattern.
  build-libs-windows-x86_64-cuda:
    runs-on: windows-latest
    env:
      CUDA_VERSION: "12.8.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install CUDA Toolkit 12.8.0
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "nvrtc", "nvrtc_dev", "nvtx", "cuda_profiler_api", "visual_studio_integration"]'

      - name: Build (shared libs, CUDA)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build-libs -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=ON ^
            -DCRISPASR_BUILD_TESTS=OFF ^
            -DCRISPASR_BUILD_EXAMPLES=OFF ^
            -DCRISPASR_BUILD_SERVER=OFF ^
            -DGGML_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="75-real;86-real;89-real;120-real;120-virtual" ^
            -DGGML_NATIVE=OFF ^
            -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON
          cmake --build build-libs --config Release -j %NUMBER_OF_PROCESSORS% --target crispasr

      - name: Package
        shell: pwsh
        run: |
          $OUT = "release\libcrispasr-windows-x86_64-cuda"
          New-Item -ItemType Directory -Force "$OUT\bin","$OUT\src\Release","$OUT\ggml\src\Release","$OUT\ggml\bin","$OUT\include","$OUT\ggml\include" | Out-Null
          # Ninja flat layout: dlls in build-libs\bin, libs in build-libs\src
          $BIN_DIRS = @("build-libs\bin\Release","build-libs\bin")
          foreach ($d in $BIN_DIRS) {
            if (Test-Path $d) {
              Get-ChildItem "$d\*.dll" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\bin\"
              Get-ChildItem "$d\ggml*.dll" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\ggml\bin\"
            }
          }
          $LIB_DIRS = @("build-libs\src\Release","build-libs\src")
          foreach ($d in $LIB_DIRS) {
            if (Test-Path $d) {
              Get-ChildItem "$d\*.lib" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\src\Release\"
            }
          }
          $GGML_LIB_DIRS = @("build-libs\ggml\src\Release","build-libs\ggml\src")
          foreach ($d in $GGML_LIB_DIRS) {
            if (Test-Path $d) {
              Get-ChildItem "$d\*.lib" -ErrorAction SilentlyContinue |
                Copy-Item -Destination "$OUT\ggml\src\Release\"
            }
          }
          # CUDA runtime DLLs — bundled so the tarball is self-contained
          # on Windows hosts that haven't added CUDA bin to PATH.
          Copy-Item "$env:CUDA_PATH\bin\cudart64_*.dll"   "$OUT\bin\" -ErrorAction SilentlyContinue
          Copy-Item "$env:CUDA_PATH\bin\cublas64_*.dll"   "$OUT\bin\" -ErrorAction SilentlyContinue
          Copy-Item "$env:CUDA_PATH\bin\cublasLt64_*.dll" "$OUT\bin\" -ErrorAction SilentlyContinue
          Copy-Item include\crispasr.h "$OUT\include\"
          Get-ChildItem ggml\include\*.h -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\include\"
          Copy-Item LICENSE "$OUT\"
          cd release
          tar -czf libcrispasr-windows-x86_64-cuda.tar.gz libcrispasr-windows-x86_64-cuda
          Get-Item libcrispasr-windows-x86_64-cuda.tar.gz | Format-List Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-windows-x86_64-cuda
          path: release/libcrispasr-windows-x86_64-cuda.tar.gz

  # ── Windows x86_64 shared libs + headers (CPU legacy SSE4.2) ─────────────────
  # For dev hosts on pre-Haswell CPUs (Sandy/Ivy Bridge i5/i7-3xxx, AMD
  # pre-Excavator). Same layout as build-libs-windows-x86_64 but built
  # with -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF. Symptoms of
  # using the wrong build on a legacy host: silent instant exit
  # (STATUS_ILLEGAL_INSTRUCTION) with no error message.
  build-libs-windows-x86_64-cpu-legacy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Build (shared libs, CPU legacy SSE4.2)
        run: |
          cmake -S . -B build-libs `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DCRISPASR_BUILD_TESTS=OFF `
            -DCRISPASR_BUILD_EXAMPLES=OFF `
            -DCRISPASR_BUILD_SERVER=OFF `
            -DGGML_NATIVE=OFF `
            -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF `
            -DGGML_AVX=ON
          cmake --build build-libs --config Release -j $env:NUMBER_OF_PROCESSORS --target crispasr

      - name: Package
        shell: pwsh
        run: |
          $OUT = "release\libcrispasr-windows-x86_64-cpu-legacy"
          New-Item -ItemType Directory -Force "$OUT\bin","$OUT\src\Release","$OUT\ggml\src\Release","$OUT\ggml\bin","$OUT\include","$OUT\ggml\include" | Out-Null
          Get-ChildItem build-libs\bin\Release\*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\bin\"
          Get-ChildItem build-libs\bin\Release\ggml*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\bin\"
          Get-ChildItem build-libs\src\Release\*.lib -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\src\Release\"
          Get-ChildItem build-libs\ggml\src\Release\*.lib -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\src\Release\"
          Copy-Item include\crispasr.h "$OUT\include\"
          Get-ChildItem ggml\include\*.h -ErrorAction SilentlyContinue |
            Copy-Item -Destination "$OUT\ggml\include\"
          Copy-Item LICENSE "$OUT\"
          cd release
          tar -czf libcrispasr-windows-x86_64-cpu-legacy.tar.gz libcrispasr-windows-x86_64-cpu-legacy
          Get-Item libcrispasr-windows-x86_64-cpu-legacy.tar.gz | Format-List Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: libcrispasr-windows-x86_64-cpu-legacy
          path: release/libcrispasr-windows-x86_64-cpu-legacy.tar.gz

  # ── Windows CPU (AVX2 — Haswell/2013+ baseline) ──────────────────────────────
  build-windows-cpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Build
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_NATIVE=OFF `
            -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON
          cmake --build build --config Release --target crispasr-cli crispasr-quantize -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          New-Item -ItemType Directory -Force release\crispasr-windows-x86_64-cpu
          Copy-Item build\bin\Release\crispasr.exe release\crispasr-windows-x86_64-cpu\
          Copy-Item build\bin\Release\crispasr-quantize.exe release\crispasr-windows-x86_64-cpu\
          Compress-Archive -Path release\crispasr-windows-x86_64-cpu -DestinationPath release\crispasr-windows-x86_64-cpu.zip -CompressionLevel Optimal

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-windows-x86_64-cpu
          path: release/crispasr-windows-x86_64-cpu.zip

  # ── Windows CPU legacy (SSE4.2 — Sandy Bridge/2011+, no AVX2/FMA/F16C) ───────
  # For CPUs that predate Haswell: Ivy Bridge (i5-3xxx, i7-3xxx), Sandy Bridge,
  # AMD pre-Excavator. Symptoms of using the wrong build: silent instant exit
  # (STATUS_ILLEGAL_INSTRUCTION) with no error message.
  build-windows-cpu-legacy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Build
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_NATIVE=OFF `
            -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF `
            -DGGML_AVX=ON
          cmake --build build --config Release --target crispasr-cli crispasr-quantize -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          New-Item -ItemType Directory -Force release\crispasr-windows-x86_64-cpu-legacy
          Copy-Item build\bin\Release\crispasr.exe release\crispasr-windows-x86_64-cpu-legacy\
          Copy-Item build\bin\Release\crispasr-quantize.exe release\crispasr-windows-x86_64-cpu-legacy\
          Compress-Archive -Path release\crispasr-windows-x86_64-cpu-legacy -DestinationPath release\crispasr-windows-x86_64-cpu-legacy.zip -CompressionLevel Optimal

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-windows-x86_64-cpu-legacy
          path: release/crispasr-windows-x86_64-cpu-legacy.zip

  # ── Windows CUDA (dynamic, requires NVIDIA driver on target machine) ─────────
  build-windows-cuda:
    runs-on: windows-latest
    env:
      CUDA_VERSION: "12.8.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      # CUDA 12.8 is the minimum that ships sm_120 SASS for Blackwell
      # consumer GPUs (RTX 50xx). Earlier toolkits (12.4 etc.) only know
      # up to sm_90, so RTX 5060/5070/5080/5090 fail at runtime with
      # 'no kernel image is available'.
      - name: Install CUDA Toolkit 12.8.0
        # v0.2.19 only knows up to CUDA 12.4; v0.2.35 added 12.8 + 12.9
        # support. Required for sm_120 (RTX 50xx, Blackwell consumer) builds.
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "nvrtc", "nvrtc_dev", "nvtx", "cuda_profiler_api", "visual_studio_integration"]'

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DGGML_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="75-real;86-real;89-real;120-real;120-virtual" ^
            -DGGML_NATIVE=OFF ^
            -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON
          cmake --build build --target crispasr-cli crispasr-quantize -j %NUMBER_OF_PROCESSORS%

      - name: Package (binary + DLLs + CUDA runtime)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release\crispasr-windows-x86_64-cuda | Out-Null
          Copy-Item build\bin\crispasr.exe          release\crispasr-windows-x86_64-cuda\
          Copy-Item build\bin\crispasr-quantize.exe release\crispasr-windows-x86_64-cuda\
          Get-ChildItem build\bin\*.dll | Where-Object { $_.Name -notlike 'Catch2*' } |
            Copy-Item -Destination release\crispasr-windows-x86_64-cuda\
          Copy-Item "$env:CUDA_PATH\bin\cudart64_*.dll"   release\crispasr-windows-x86_64-cuda\ -ErrorAction SilentlyContinue
          Copy-Item "$env:CUDA_PATH\bin\cublas64_*.dll"   release\crispasr-windows-x86_64-cuda\ -ErrorAction SilentlyContinue
          Copy-Item "$env:CUDA_PATH\bin\cublasLt64_*.dll" release\crispasr-windows-x86_64-cuda\ -ErrorAction SilentlyContinue
          Compress-Archive -Path release\crispasr-windows-x86_64-cuda -DestinationPath release\crispasr-windows-x86_64-cuda.zip -CompressionLevel Optimal

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-windows-x86_64-cuda
          path: release/crispasr-windows-x86_64-cuda.zip

  # ── Windows Vulkan (dynamic, works on NVIDIA/AMD/Intel with a Vulkan driver) ─
  build-windows-vulkan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod -Uri "https://vulkan.lunarg.com/sdk/latest.json").windows
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkan_sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan_sdk.exe
          Start-Process -FilePath .\vulkan_sdk.exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          $sdk = "C:\VulkanSDK\$ver"
          echo "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DGGML_VULKAN=ON ^
            -DGGML_CUDA=OFF ^
            -DGGML_NATIVE=OFF ^
            -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON
          cmake --build build --target crispasr-cli crispasr-quantize -j %NUMBER_OF_PROCESSORS%

      - name: Package (binary + DLLs)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release\crispasr-windows-x86_64-vulkan | Out-Null
          Copy-Item build\bin\crispasr.exe          release\crispasr-windows-x86_64-vulkan\
          Copy-Item build\bin\crispasr-quantize.exe release\crispasr-windows-x86_64-vulkan\
          Get-ChildItem build\bin\*.dll | Where-Object { $_.Name -notlike 'Catch2*' } |
            Copy-Item -Destination release\crispasr-windows-x86_64-vulkan\
          Compress-Archive -Path release\crispasr-windows-x86_64-vulkan -DestinationPath release\crispasr-windows-x86_64-vulkan.zip -CompressionLevel Optimal

      - uses: actions/upload-artifact@v4
        with:
          name: crispasr-windows-x86_64-vulkan
          path: release/crispasr-windows-x86_64-vulkan.zip

  publish:
    needs: [build-linux, build-python-linux, build-macos, build-libs-macos-arm64, build-libs-linux-x86_64, build-libs-linux-x86_64-cuda, build-libs-windows-x86_64, build-libs-windows-x86_64-vulkan, build-libs-windows-x86_64-cuda, build-libs-windows-x86_64-cpu-legacy, build-windows-cpu, build-windows-cpu-legacy, build-windows-cuda, build-windows-vulkan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/crispasr-linux-x86_64/crispasr-linux-x86_64.tar.gz
            artifacts/crispasr-python-linux-x86_64/crispasr-python-linux-x86_64.tar.gz
            artifacts/crispasr-macos/crispasr-macos.tar.gz
            artifacts/libcrispasr-macos-arm64/libcrispasr-macos-arm64.tar.gz
            artifacts/libcrispasr-linux-x86_64/libcrispasr-linux-x86_64.tar.gz
            artifacts/libcrispasr-linux-x86_64-cuda/libcrispasr-linux-x86_64-cuda.tar.gz
            artifacts/libcrispasr-windows-x86_64/libcrispasr-windows-x86_64.tar.gz
            artifacts/libcrispasr-windows-x86_64-vulkan/libcrispasr-windows-x86_64-vulkan.tar.gz
            artifacts/libcrispasr-windows-x86_64-cuda/libcrispasr-windows-x86_64-cuda.tar.gz
            artifacts/libcrispasr-windows-x86_64-cpu-legacy/libcrispasr-windows-x86_64-cpu-legacy.tar.gz
            artifacts/crispasr-windows-x86_64-cpu/crispasr-windows-x86_64-cpu.zip
            artifacts/crispasr-windows-x86_64-cpu-legacy/crispasr-windows-x86_64-cpu-legacy.zip
            artifacts/crispasr-windows-x86_64-cuda/crispasr-windows-x86_64-cuda.zip
            artifacts/crispasr-windows-x86_64-vulkan/crispasr-windows-x86_64-vulkan.zip
          generate_release_notes: true
